services:
  streaming-engine:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - cache:/app/cache
      - results:/app/results
    environment:
      - APP_ENVIRONMENT=docker
      - APP_APPLICATION__HOST=0.0.0.0
      - APP_APPLICATION__WEB_UI=true
      - PORT=8080
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cache:
  results:
  redis-data:
