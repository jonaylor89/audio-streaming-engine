application:
  host: 127.0.0.1
  hmac_secret: "this-is-a-secret"

storage:
  base_dir: "uploads"
  path_prefix: ""
  safe_chars: "default"

# result_storage: optional separate backend for processed audio results.
# If omitted, results are stored in the same backend as `storage`.
# Accepts the same fields as `storage` (base_dir, path_prefix, safe_chars, client).
# result_storage:
#   base_dir: "results"

processor:
  disabled_filters: []
  max_filter_ops: 256
  max_cache_files: 1000
  max_cache_mem: 256
  max_cache_size: 1024
  max_source_size: 104857600  # 100 MB
